name: Feature Request
description: Suggest a new feature or improvement
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like and why it would be useful.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Codex does this relate to?
      options:
        - Backend / API
        - Frontend / UI
        - Library scanning
        - File format support
        - OPDS
        - Docker / Deployment
        - Documentation
        - Plugins / SDK
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or what use case does it address?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references that might help
