# Docker Compose with watch mode for development
# Usage: docker compose -f docker-compose.yml -f compose.watch.yml --profile dev watch

services:
  codex-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    develop:
      watch:
        # Sync source code changes
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - "**/*.swp"
            - "**/*.tmp"

        # Sync Cargo files
        - action: sync
          path: ./Cargo.toml
          target: /app/Cargo.toml

        - action: sync
          path: ./Cargo.lock
          target: /app/Cargo.lock

        # Sync migrations
        - action: sync
          path: ./migrations
          target: /app/migrations

        # Rebuild on config changes
        - action: rebuild
          path: ./Dockerfile.dev

  frontend-dev:
    develop:
      watch:
        # Sync source code changes (Vite handles HMR)
        - action: sync
          path: ./web/src
          target: /app/src
          ignore:
            - "**/*.swp"
            - "**/*.tmp"

        # Sync public assets
        - action: sync
          path: ./web/public
          target: /app/public

        # Sync config files
        - action: sync
          path: ./web/vite.config.ts
          target: /app/vite.config.ts

        - action: sync
          path: ./web/tsconfig.json
          target: /app/tsconfig.json

        - action: sync
          path: ./web/tsconfig.app.json
          target: /app/tsconfig.app.json

        - action: sync
          path: ./web/tsconfig.node.json
          target: /app/tsconfig.node.json

        - action: sync
          path: ./web/biome.json
          target: /app/biome.json

        # Restart when dependencies change (npm install will run on restart)
        - action: sync+restart
          path: ./web/package.json
          target: /app/package.json

        - action: sync+restart
          path: ./web/package-lock.json
          target: /app/package-lock.json
