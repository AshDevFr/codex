# Pre-commit hooks for Codex
# Install with: make setup-hooks (or: pre-commit install)
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Rust format
        entry: cargo fmt --
        language: system
        types: [rust]
        pass_filenames: true

      - id: cargo-clippy
        name: Rust clippy (warnings only)
        entry: bash -c 'cargo clippy --all-targets --all-features -- -W clippy::all || true'
        language: system
        types: [rust]
        pass_filenames: false
        verbose: true

      - id: openapi-sync
        name: Check OpenAPI files are in sync
        entry: ./scripts/check-openapi-sync.sh
        language: script
        files: ^(src/api/.*\.rs|src/db/entities/.*\.rs|web/openapi\.json|web/src/types/api\.generated\.ts)$
        pass_filenames: false

      - id: plugin-lint-fix
        name: Fix plugin lint issues
        entry: make plugins-lint-fix
        language: system
        files: ^plugins/.*$
        pass_filenames: false

      - id: frontend-lint-fix
        name: Fix frontend lint issues
        entry: make frontend-lint-fix
        language: system
        files: ^web/.*$
        pass_filenames: false
