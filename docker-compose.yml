services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: codex-postgres
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex
      POSTGRES_DB: codex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codex-network

  # Codex application (production)
  codex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - codex_data:/app/data
      - ./docker/data/library:/library:ro
    command: ["codex", "serve", "--config", "/app/config/config.docker.yaml"]
    environment:
      # Email configuration for Mailhog
      EMAIL_SMTP_HOST: mailhog
      EMAIL_SMTP_PORT: 1025
      # Configuration overrides (optional - uses CODEX_ prefix)
      # These override values in the config file
      # CODEX_APPLICATION_HOST: 0.0.0.0
      # CODEX_APPLICATION_PORT: 8080
      # CODEX_DATABASE_DB_TYPE: postgres
      # CODEX_DATABASE_POSTGRES_HOST: postgres
      # CODEX_DATABASE_POSTGRES_PORT: 5432
      # CODEX_DATABASE_POSTGRES_USERNAME: codex
      # CODEX_DATABASE_POSTGRES_PASSWORD: codex
      # CODEX_DATABASE_POSTGRES_DATABASE_NAME: codex
      #
      # Database Settings (Runtime Configurable via Admin API)
      # ========================================================
      # Most settings have been moved to the database for runtime configurability.
      # To change these settings without restarting the container, use the admin API:
      #   docker exec -it codex-app curl -X PUT http://localhost:8080/api/v1/admin/settings/{key} \
      #     -H "Authorization: Bearer <token>" -d '{"value": "..."}'
      #
      # Scanner settings (in database):
      #   - scanner.max_concurrent_scans (default: 2)
      #   - scanner.scan_timeout_minutes (default: 120)
      #   - scanner.retry_failed_files (default: false)
      #   - scanner.auto_analyze_concurrency (default: 4)
      #
      # Application settings (in database):
      #   - application.name (default: "Codex")
      #
      # Logging settings (in database):
      #   - logging.level (default: "info")
      #   - logging.console (default: true)
      #
      # Task worker settings (in database):
      #   - task.poll_interval_seconds (default: 5)
      #   - task.cleanup_interval_seconds (default: 30)
      #
      # NOTE: Environment variables override database settings!
      # Uncomment below to force specific values (prevents runtime configurability):
      # CODEX_LOGGING_LEVEL: info
      # CODEX_SCANNER_MAX_CONCURRENT_SCANS: 2
    networks:
      - codex-network
    restart: unless-stopped
    profiles:
      - prod

  # Codex development (with hot reload)
  codex-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: codex-dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
      - ./config:/app/config:ro
      - ./docker/data/library:/library:ro
    environment:
      RUST_BACKTRACE: 1
      # Email configuration for Mailhog
      EMAIL_SMTP_HOST: mailhog
      EMAIL_SMTP_PORT: 1025
      # Configuration overrides (optional - uses CODEX_ prefix)
      # Uncomment and modify as needed to override config.docker.yaml values
      # CODEX_APPLICATION_HOST: 0.0.0.0
      # CODEX_APPLICATION_PORT: 8080
      # CODEX_DATABASE_POSTGRES_HOST: postgres
      # CODEX_DATABASE_POSTGRES_PORT: 5432
      # CODEX_DATABASE_POSTGRES_USERNAME: codex
      # CODEX_DATABASE_POSTGRES_PASSWORD: codex
      # CODEX_DATABASE_POSTGRES_DATABASE_NAME: codex
      CODEX_LOGGING_LEVEL: debug
      #
      # Database Settings - see production service above for details
      # Most settings now runtime configurable via admin API
    networks:
      - codex-network
    profiles:
      - dev

  # Frontend development server (Vite)
  # The Vite dev server proxies /api and /opds requests to codex-dev backend
  # Access the app at http://localhost:5173
  frontend-dev:
    image: node:22-alpine
    container_name: codex-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      # Set proxy target for Vite dev server to connect to backend service
      # This is used by vite.config.ts proxy configuration
      VITE_API_URL: http://codex-dev:8080
    volumes:
      - ./web:/app
      - node_modules:/app/node_modules
    depends_on:
      - codex-dev
    networks:
      - codex-network
    profiles:
      - dev

  # PostgreSQL for testing (separate from main DB)
  postgres-test:
    image: postgres:16-alpine
    container_name: codex-postgres-test
    environment:
      POSTGRES_USER: codex_test
      POSTGRES_PASSWORD: codex_test
      POSTGRES_DB: codex_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex_test"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - codex-network
    profiles:
      - test

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog
    container_name: codex-mailhog
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - codex-network
    profiles:
      - dev
      - prod

volumes:
  postgres_data:
    driver: local
  codex_data:
    driver: local
  cargo_cache:
    driver: local
  target_cache:
    driver: local
  node_modules:
    driver: local

networks:
  codex-network:
    driver: bridge
