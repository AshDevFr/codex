services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: codex-postgres
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex
      POSTGRES_DB: codex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codex-network

  # Codex application (production)
  codex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - codex_data:/app/data # Includes thumbnail cache at /app/data/thumbnails
      - ./docker/data/libraries:/libraries:ro
      - ./docker/data/thumbnails:/app/data/thumbnails:rw
    command: ["codex", "serve", "--config", "/app/config/config.docker.yaml"]
    environment:
      # Email configuration for Mailhog
      EMAIL_SMTP_HOST: mailhog
      EMAIL_SMTP_PORT: 1025
      # Configuration overrides (optional - uses CODEX_ prefix)
      # These override values in the config file
      # Application configuration
      # CODEX_APPLICATION_HOST: 0.0.0.0
      # CODEX_APPLICATION_PORT: 8080

      # Database connection
      # CODEX_DATABASE_DB_TYPE: postgres
      # CODEX_DATABASE_POSTGRES_HOST: postgres
      # CODEX_DATABASE_POSTGRES_PORT: 5432
      # CODEX_DATABASE_POSTGRES_USERNAME: codex
      # CODEX_DATABASE_POSTGRES_PASSWORD: codex
      # CODEX_DATABASE_POSTGRES_DATABASE_NAME: codex
      #
      # Startup-time settings (in config file, require restart):
      # CODEX_TASK_WORKER_COUNT: 4 # Number of parallel task workers per pod
      # CODEX_SCANNER_MAX_CONCURRENT_SCANS: 2 # Maximum number of concurrent library scans
      # CODEX_THUMBNAIL_CACHE_DIR: data/thumbnails # Thumbnail cache directory (default: data/thumbnails)
    networks:
      - codex-network
    restart: unless-stopped
    profiles:
      - prod

  # Codex development (with hot reload)
  codex-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: codex-dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
      - ./config:/app/config:ro
      - ./docker/data/libraries:/libraries:ro
      - ./docker/data/thumbnails:/app/data/thumbnails:rw
      - ./docker/data/uploads:/app/data/uploads:rw
    environment:
      RUST_BACKTRACE: 1
      # Email configuration for Mailhog
      EMAIL_SMTP_HOST: mailhog
      EMAIL_SMTP_PORT: 1025
      # Disable workers in web container (workers run in separate container)
      CODEX_DISABLE_WORKERS: "true"
      # Configuration overrides (optional - uses CODEX_ prefix)
      # Uncomment and modify as needed to override config.docker.yaml values
      # Database connection
      # CODEX_DATABASE_DB_TYPE: postgres
      # CODEX_DATABASE_POSTGRES_HOST: postgres
      # CODEX_DATABASE_POSTGRES_PORT: 5432
      # CODEX_DATABASE_POSTGRES_USERNAME: codex
      # CODEX_DATABASE_POSTGRES_PASSWORD: codex
      # CODEX_DATABASE_POSTGRES_DATABASE_NAME: codex
      CODEX_LOGGING_LEVEL: debug
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - codex-network
    profiles:
      - dev

  # Codex worker (dedicated worker container for development)
  # Note: Workers also check migrations on startup, but will skip if CODEX_SKIP_MIGRATIONS is set
  codex-dev-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: codex-dev-worker
    depends_on:
      postgres:
        condition: service_healthy
      codex-dev:
        condition: service_healthy
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
      - ./config:/app/config:ro
      - ./docker/data/libraries:/libraries:ro
      - ./docker/data/thumbnails:/app/data/thumbnails:rw
      - ./docker/data/uploads:/app/data/uploads:rw
    command:
      [
        "cargo",
        "watch",
        "-w",
        ".cargo-watch.toml",
        "-w",
        "Cargo.toml",
        "-w",
        "Cargo.lock",
        "-w",
        "src/",
        "-w",
        "migration/",
        "-i",
        "web/**",
        "-i",
        "docs/**",
        "-i",
        "*.md",
        "-i",
        "Dockerfile*",
        "-i",
        "docker-compose*.yml",
        "-x",
        "run -- worker --config /app/config/config.docker.yaml",
      ]
    environment:
      RUST_BACKTRACE: 1
      # Worker count (can also be set in config file)
      CODEX_TASK_WORKER_COUNT: "2"
      CODEX_SKIP_MIGRATIONS: "true"
      # Database connection
      # CODEX_DATABASE_DB_TYPE: postgres
      # CODEX_DATABASE_POSTGRES_HOST: postgres
      # CODEX_DATABASE_POSTGRES_PORT: 5432
      # CODEX_DATABASE_POSTGRES_USERNAME: codex
      # CODEX_DATABASE_POSTGRES_PASSWORD: codex
      # CODEX_DATABASE_POSTGRES_DATABASE_NAME: codex
      CODEX_LOGGING_LEVEL: debug
    networks:
      - codex-network
    profiles:
      - dev

  # Frontend development server (Vite)
  # The Vite dev server proxies /api and /opds requests to codex-dev backend
  # Access the app at http://localhost:5173
  frontend-dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: codex-frontend-dev
    ports:
      - "5173:5173"
    environment:
      # Set proxy target for Vite dev server to connect to backend service
      # This is used by vite.config.ts proxy configuration
      VITE_API_URL: http://codex-dev:8080
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.ts:/app/vite.config.ts
      - ./web/tsconfig.json:/app/tsconfig.json
      - ./web/package.json:/app/package.json
      - node_modules:/app/node_modules # Named volume to preserve container's node_modules
    depends_on:
      - codex-dev
    networks:
      - codex-network
    profiles:
      - dev

  # PostgreSQL for testing (separate from main DB)
  postgres-test:
    image: postgres:16-alpine
    container_name: codex-postgres-test
    environment:
      POSTGRES_USER: codex_test
      POSTGRES_PASSWORD: codex_test
      POSTGRES_DB: codex_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex_test"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - codex-network
    profiles:
      - test

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog
    container_name: codex-mailhog
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - codex-network
    profiles:
      - dev
      - prod

  # Documentation server
  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    container_name: codex-docs
    ports:
      - "3000:3000"
    networks:
      - codex-network
    profiles:
      - docs

volumes:
  postgres_data:
    driver: local
  codex_data:
    driver: local
  cargo_cache:
    driver: local
  target_cache:
    driver: local
  node_modules:
    driver: local

networks:
  codex-network:
    driver: bridge
