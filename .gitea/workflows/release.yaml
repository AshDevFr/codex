name: Build and Release

on:
  push:
    tags:
      - "v*" # Triggers on tags starting with 'v', e.g., v1.0.0, v2.1
      - "!v*-alpha" # Excludes tags ending with '-alpha'

jobs:
  # Build binaries for all platforms
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: catthehacker/ubuntu:act-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (native build with RAR support)
          - target: x86_64-unknown-linux-gnu
            artifact_name: codex-x86_64-linux-gnu
            use_cross: false
            features: "embed-frontend,rar"
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            artifact_name: codex-aarch64-linux-gnu
            use_cross: true
            features: "embed-frontend"
          # macOS x86_64
          - target: x86_64-apple-darwin
            artifact_name: codex-x86_64-macos
            use_cross: true
            features: "embed-frontend"
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            artifact_name: codex-aarch64-macos
            use_cross: true
            features: "embed-frontend"
          # Windows x86_64
          - target: x86_64-pc-windows-gnu
            artifact_name: codex-x86_64-windows
            use_cross: true
            features: "embed-frontend"
            extension: ".exe"

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary (native)
        if: ${{ !matrix.use_cross }}
        run: |
          cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Build release binary (cross)
        if: matrix.use_cross
        run: |
          cross build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/codex${{ matrix.extension || '' }} artifacts/
          cd artifacts
          if [ -n "${{ matrix.extension }}" ]; then
            zip ${{ matrix.artifact_name }}.zip codex${{ matrix.extension }}
          else
            chmod +x codex
            tar -czf ${{ matrix.artifact_name }}.tar.gz codex
          fi
          rm codex${{ matrix.extension || '' }}
          ls -lh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}.*
          retention-days: 30

  # Build and push Docker image
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Registry FQDN Setup
        id: registry
        run: |
          registry=${{ github.server_url }}
          echo "registry=${registry##http*://}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.registry.outputs.registry }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            VERSION=${{ steps.version.outputs.tag }}
            BUILD_ENV=production
          cache-from: type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache,mode=max

  # Publish all artifacts and create release
  release:
    name: Create Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: codex-*
          merge-multiple: true

      - name: Get version info
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          export TZ=UTC
          echo "date=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          cd artifacts
          for file in *.tar.gz *.zip; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done
          echo "Release artifacts:"
          ls -lh

      - name: Publish packages to registry
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          version="${{ steps.version.outputs.tag }}"

          for file in *.tar.gz *.zip; do
            if [ -f "$file" ]; then
              echo "Publishing $file..."

              # Determine content type
              if [[ "$file" == *.zip ]]; then
                content_type="application/zip"
              else
                content_type="application/gzip"
              fi

              curl -s -X PUT \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: $content_type" \
                --data-binary @"$file" \
                "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/codex/$version/$file" || echo "Failed to upload $file"

              # Upload checksum
              if [ -f "$file.sha256" ]; then
                curl -s -X PUT \
                  -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Content-Type: text/plain" \
                  --data-binary @"$file.sha256" \
                  "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/codex/$version/$file.sha256" || echo "Failed to upload $file.sha256"
              fi
            fi
          done

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          version="${{ steps.version.outputs.tag }}"
          PACKAGE_URL="${{ github.server_url }}/${{ github.repository_owner }}/-/packages/generic/codex/$version"

          # Build download links
          DOWNLOAD_LINKS=""
          for file in *.tar.gz *.zip; do
            if [ -f "$file" ]; then
              DOWNLOAD_URL="${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/codex/$version/$file"

              # Determine platform from filename
              if echo "$file" | grep -q "windows"; then
                platform="Windows x64"
              elif echo "$file" | grep -q "aarch64.*macos"; then
                platform="macOS ARM64 (Apple Silicon)"
              elif echo "$file" | grep -q "x86_64.*macos"; then
                platform="macOS x64 (Intel)"
              elif echo "$file" | grep -q "aarch64.*linux"; then
                platform="Linux ARM64"
              elif echo "$file" | grep -q "x86_64.*linux"; then
                platform="Linux x64"
              else
                platform="Binary"
              fi

              DOWNLOAD_LINKS="${DOWNLOAD_LINKS}- **${platform}**: [$file](${DOWNLOAD_URL})\n"
            fi
          done

          # Create release body
          RELEASE_BODY="## Codex $version

Built from commit \`${{ steps.version.outputs.sha_short }}\` on ${{ steps.version.outputs.date }}

### Downloads

${DOWNLOAD_LINKS}

### Checksums

SHA256 checksums are available for each download (append \`.sha256\` to the URL).

### Docker

\`\`\`bash
docker pull ${{ github.server_url }}/${{ github.repository }}:$version
\`\`\`

### Notes

- **Linux x64** includes CBR/RAR support
- **Other platforms** support CBZ, EPUB, and PDF only (no RAR due to cross-compilation limitations)
- **macOS users**: You may need to allow the app in System Preferences > Security & Privacy

[View All Packages](${PACKAGE_URL})"

          # Create the release
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"$version\",
              \"name\": \"Codex $version\",
              \"body\": $(echo -e "$RELEASE_BODY" | jq -Rs .),
              \"draft\": false,
              \"prerelease\": false
            }" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases")

          echo "Release created:"
          echo "$RESPONSE" | jq -r '.html_url // .message' || echo "$RESPONSE"
