name: Build and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1: Run tests first for fastest feedback
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          cargo test --features rar

  # Stage 1: Run lint checks in parallel with tests
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: |
          cargo fmt -- --check

      - name: Clippy check
        continue-on-error: true
        run: |
          cargo clippy --features rar -- -D warnings

  # Stage 2: Build release binaries with cargo-dist (after tests pass)
  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: catthehacker/ubuntu:act-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-dist
        run: |
          cargo install cargo-dist --locked

      - name: Build binaries with cargo-dist
        run: |
          cargo dist build --local --features rar --output-format=json > dist-manifest.json || true

      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v3
        with:
          name: dist-artifacts
          path: |
            target/dist/
            dist-manifest.json
          retention-days: 3

  # Stage 2: Build and push Docker image (parallel with build)
  docker:
    needs: [test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Registry FQDN Setup
        id: registry
        run: |
          registry=${{ github.server_url }}
          echo "registry=${registry##http*://}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.registry.outputs.registry }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            BUILD_ENV=production
          # Multiple cache sources for better hit rate
          # Try latest cache first, then fallback to main cache
          cache-from: |
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache-latest
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache
          # Cache to both a "latest" tag (for fast access) and versioned cache
          cache-to: |
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache-latest,mode=max
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache,mode=max

  # Stage 3: Publish binaries (after build completes, push only)
  publish:
    needs: [build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist-artifacts

      - name: Get version info
        id: version
        run: |
          echo "tag=dev" >> $GITHUB_OUTPUT
          echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          export TZ=UTC
          echo "date=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: Publish dev binaries to registry
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Find all built artifacts
          for artifact in $(find target/dist -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.msi" -o -name "*.pkg" \) 2>/dev/null); do
            filename=$(basename "$artifact")
            echo "Publishing $filename as dev build..."

            # Determine content type
            case "$artifact" in
              *.zip)
                content_type="application/zip"
                ;;
              *.tar.gz)
                content_type="application/gzip"
                ;;
              *.msi)
                content_type="application/x-msi"
                ;;
              *.pkg)
                content_type="application/x-apple-installer-package"
                ;;
              *)
                content_type="application/octet-stream"
                ;;
            esac

            # Upload to Gitea package registry with "dev" label
            curl -v -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: $content_type" \
              --data-binary @"$artifact" \
              "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/codex/dev/$filename" || echo "Failed to upload $filename"
          done
