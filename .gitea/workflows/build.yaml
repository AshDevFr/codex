name: Build and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main # Only run on main branch pushes

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-dist
        run: |
          cargo install cargo-dist --locked

      - name: Build Rust package
        run: |
          cargo build --release --features rar

      - name: Run tests
        run: |
          cargo test --features rar

      - name: Format check
        run: |
          cargo fmt -- --check

      - name: Clippy check
        run: |
          cargo clippy --features rar -- -D warnings

      - name: Build binaries with cargo-dist (current platform)
        if: github.event_name == 'push'
        run: |
          cargo dist build --local --features rar --output-format=json > dist-manifest.json || true

      - name: Get version info
        if: github.event_name == 'push'
        id: version
        run: |
          # Use commit SHA as version identifier for dev builds
          echo "tag=dev" >> $GITHUB_OUTPUT
          echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          export TZ=UTC
          echo "date=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: Publish dev binaries to registry
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Find all built artifacts
          for artifact in $(find target/dist -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.msi" -o -name "*.pkg" \) 2>/dev/null); do
            filename=$(basename "$artifact")
            echo "Publishing $filename as dev build..."

            # Determine content type
            case "$artifact" in
              *.zip)
                content_type="application/zip"
                ;;
              *.tar.gz)
                content_type="application/gzip"
                ;;
              *.msi)
                content_type="application/x-msi"
                ;;
              *.pkg)
                content_type="application/x-apple-installer-package"
                ;;
              *)
                content_type="application/octet-stream"
                ;;
            esac

            # Upload to Gitea package registry with "dev" label
            curl -v -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: $content_type" \
              --data-binary @"$artifact" \
              "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/codex/dev/$filename" || echo "Failed to upload $filename"
          done

      - name: Registry FQDN Setup
        id: registry
        if: github.event_name == 'push'
        run: |
          registry=${{ github.server_url }}
          echo "registry=${registry##http*://}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            ${{ steps.registry.outputs.registry }}/${{ github.repository }}
          # generate Docker tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            BUILD_ENV=production
          cache-from: type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache,mode=max
