name: Build and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1: Run tests first for fastest feedback
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          cargo test --features rar

  # Stage 1: Run lint checks in parallel with tests
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        continue-on-error: true
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: |
          cargo fmt -- --check

      - name: Clippy check
        continue-on-error: true
        run: |
          cargo clippy --features rar -- -D warnings

  # Stage 1: Run frontend checks in parallel with tests and lint
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --include=optional

      - name: Lint check
        continue-on-error: true
        working-directory: web
        run: npm run lint

      - name: Run tests
        working-directory: web
        run: npm run test:run

      - name: Build check
        working-directory: web
        run: npm run build

  # Stage 2: Build release binaries for all platforms (after tests pass)
  build:
    needs: [test, lint, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: catthehacker/ubuntu:act-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (native build with RAR support)
          - target: x86_64-unknown-linux-gnu
            artifact_name: codex-x86_64-linux-gnu
            use_cross: false
            features: "embed-frontend,rar"
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            artifact_name: codex-aarch64-linux-gnu
            use_cross: true
            features: "embed-frontend"
          # macOS x86_64
          - target: x86_64-apple-darwin
            artifact_name: codex-x86_64-macos
            use_cross: true
            features: "embed-frontend"
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            artifact_name: codex-aarch64-macos
            use_cross: true
            features: "embed-frontend"
          # Windows x86_64
          - target: x86_64-pc-windows-gnu
            artifact_name: codex-x86_64-windows
            use_cross: true
            features: "embed-frontend"
            extension: ".exe"

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --include=optional
          npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary (native)
        if: ${{ !matrix.use_cross }}
        run: |
          cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Build release binary (cross)
        if: matrix.use_cross
        run: |
          cross build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/codex${{ matrix.extension || '' }} artifacts/
          cd artifacts
          if [ -n "${{ matrix.extension }}" ]; then
            zip ${{ matrix.artifact_name }}.zip codex${{ matrix.extension }}
          else
            chmod +x codex
            tar -czf ${{ matrix.artifact_name }}.tar.gz codex
          fi
          rm codex${{ matrix.extension || '' }}
          ls -lh

      - name: Upload binary artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}.*
          retention-days: 7

  # Stage 2: Build and push Docker image (parallel with build)
  docker:
    needs: [test, lint, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Registry FQDN Setup
        id: registry
        run: |
          registry=${{ github.server_url }}
          echo "registry=${registry##http*://}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.registry.outputs.registry }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            BUILD_ENV=production
          # Multiple cache sources for better hit rate
          # Try latest cache first, then fallback to main cache
          cache-from: |
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache-latest
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache
          # Cache to both a "latest" tag (for fast access) and versioned cache
          # Using mode=min to reduce cache size and avoid registry upload timeouts
          cache-to: |
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache-latest,mode=min
            type=registry,ref=${{ steps.registry.outputs.registry }}/${{ github.repository }}:buildcache,mode=min

  # Stage 3: Publish all binaries (after build completes, push only)
  publish:
    needs: [build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: codex-*
          merge-multiple: true

      - name: Get version info
        id: version
        run: |
          echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          cd artifacts
          for file in *.tar.gz *.zip; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done
          echo "Artifacts to publish:"
          ls -lh

      - name: Publish binaries to registry
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          version="${{ steps.version.outputs.version }}"

          for file in *.tar.gz *.zip; do
            if [ -f "$file" ]; then
              echo "Publishing $file..."

              # Determine content type
              if [[ "$file" == *.zip ]]; then
                content_type="application/zip"
              else
                content_type="application/gzip"
              fi

              curl -s -X PUT \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: $content_type" \
                --data-binary @"$file" \
                "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/codex/$version/$file" || echo "Failed to upload $file"

              # Upload checksum
              if [ -f "$file.sha256" ]; then
                curl -s -X PUT \
                  -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Content-Type: text/plain" \
                  --data-binary @"$file.sha256" \
                  "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/codex/$version/$file.sha256" || echo "Failed to upload $file.sha256"
              fi
            fi
          done

          echo "All artifacts published to version: $version"
