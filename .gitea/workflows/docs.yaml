name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'web/openapi.json'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'web/openapi.json'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Generate API docs from OpenAPI spec
        working-directory: docs
        run: npm run gen-api-docs

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v3
        with:
          name: docs-build
          path: docs/build
          retention-days: 7

  # Build and push Docker image for docs (push to main only)
  docker-docs:
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download docs build
        uses: actions/download-artifact@v3
        with:
          name: docs-build
          path: docs/build

      - name: Registry FQDN Setup
        id: registry
        run: |
          registry=${{ github.server_url }}
          echo "registry=${registry##http*://}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.registry.outputs.registry }}/${{ github.repository }}-docs
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push docs Docker image
        uses: docker/build-push-action@v6
        with:
          context: docs
          file: docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
