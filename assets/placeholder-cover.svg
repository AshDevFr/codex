<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
  <rect fill="#e5e7eb" width="200" height="300"/>
  <!-- Image/photo icon -->
  <g transform="translate(50, 100)" fill="#9ca3af">
    <!-- Frame -->
    <rect x="0" y="0" width="100" height="80" rx="4" fill="none" stroke="#9ca3af" stroke-width="4"/>
    <!-- Mountain/landscape -->
    <polygon points="10,65 35,40 50,55 75,30 90,65" fill="#9ca3af"/>
    <!-- Sun -->
    <circle cx="25" cy="25" r="10" fill="#9ca3af"/>
  </g>
</svg>
