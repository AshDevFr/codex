[package]
name = "codex"
version = "0.1.0"
edition = "2021"
description = "A next-generation digital library server for comics, manga, and ebooks"
license = "MIT"
repository = "https://github.com/AshDevFr/codex"
homepage = "https://github.com/AshDevFr/codex"
readme = "README.md"

[[bin]]
name = "codex"
path = "src/main.rs"

[features]
default = ["rar"]
rar = ["dep:unrar"]
embed-frontend = []

[workspace]
members = [".", "migration"]

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"

# Configuration
config = "0.14"

# Archive formats
zip = "2.1"
unrar = { version = "0.5", optional = true }

# PDF parsing
lopdf = "0.34"

# Image processing
image = "0.25"

# Hashing
sha2 = "0.10"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# XML parsing (for ComicInfo.xml)
quick-xml = { version = "0.36", features = ["serialize"] }

# Regular expressions (for ISBN extraction)
regex = "1.10"

# File system utilities
walkdir = "2.5"
dirs = "5.0"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Table formatting
tabled = "0.20"

# Database
sea-orm = { version = "1.1", features = [
    "sqlx-postgres",
    "sqlx-sqlite",
    "runtime-tokio-native-tls",
    "macros",
    "with-chrono",
    "with-uuid",
] }
sea-orm-migration = { version = "1.1", features = [
    "runtime-tokio-native-tls",
    "sqlx-postgres",
    "sqlx-sqlite",
] }
migration = { path = "migration" }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }

# Web framework
axum = { version = "0.7", features = ["multipart"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["trace", "cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
async-stream = "0.3"
futures = "0.3"
tokio-stream = "0.1"

# Authentication & Security
jsonwebtoken = "9.2"
argon2 = "0.5"
rand = "0.8"
lazy_static = "1.4"
base64 = "0.22"

# Encryption
aes-gcm = "0.10"

# Email
lettre = { version = "0.11", features = ["tokio1", "tokio1-native-tls", "smtp-transport", "builder"] }

# API Documentation
utoipa = { version = "5.0", features = ["axum_extras", "chrono", "uuid", "yaml"] }
utoipa-scalar = { version = "0.2", features = ["axum"] }

# Job Scheduling
tokio-cron-scheduler = "0.10"
tokio-util = { version = "0.7", features = ["io"] }

# Static file embedding for frontend
rust-embed = "8.5"
mime_guess = "2.0"

[dev-dependencies]
tempfile = "3.13"
tower = { version = "0.4", features = ["util"] }
http-body-util = "0.1"
hyper = { version = "1.0", features = ["full"] }
serial_test = "3.2"
