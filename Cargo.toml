[package]
name = "codex"
version = "0.1.0"
edition = "2021"
description = "A next-generation digital library server for comics, manga, and ebooks"
license = "MIT"
repository = "https://github.com/AshDevFr/codex"
homepage = "https://github.com/AshDevFr/codex"
readme = "README.md"

[[bin]]
name = "codex"
path = "src/main.rs"

[features]
default = ["rar"]
rar = ["dep:unrar"]

[workspace]
members = [".", "migration"]

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"

# Configuration
config = "0.14"

# Archive formats
zip = "2.1"
unrar = { version = "0.5", optional = true }

# PDF parsing
lopdf = "0.34"

# Image processing
image = "0.25"

# Hashing
sha2 = "0.10"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# XML parsing (for ComicInfo.xml)
quick-xml = { version = "0.36", features = ["serialize"] }

# File system utilities
walkdir = "2.5"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Table formatting
tabled = "0.20"

# Database
sea-orm = { version = "1.1", features = [
    "sqlx-postgres",
    "sqlx-sqlite",
    "runtime-tokio-native-tls",
    "macros",
    "with-chrono",
    "with-uuid",
] }
migration = { path = "migration" }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }

# Web framework
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["trace", "cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

# Authentication & Security
jsonwebtoken = "9.2"
argon2 = "0.5"
rand = "0.8"
lazy_static = "1.4"

# API Documentation
utoipa = { version = "5.0", features = ["axum_extras", "chrono", "uuid"] }
utoipa-swagger-ui = { version = "8.0", features = ["axum"] }

# Job Scheduling
tokio-cron-scheduler = "0.10"
tokio-util = "0.7"

[dev-dependencies]
tempfile = "3.13"
tower = { version = "0.4", features = ["util"] }
http-body-util = "0.1"
hyper = { version = "1.0", features = ["full"] }

# cargo-dist configuration for building standalone binaries
[workspace.metadata.dist]
# Build with rar feature (CBR support)
features = ["rar"]
# Target platforms to build for
targets = [
    "x86_64-unknown-linux-gnu", # Linux x86_64
    "x86_64-apple-darwin",      # macOS Intel
    "aarch64-apple-darwin",     # macOS Apple Silicon
    "x86_64-pc-windows-msvc",   # Windows x86_64
]
# Installers to create
installers = ["shell", "powershell", "msi", "pkg"]
# CI backends to support (using github format for Gitea compatibility)
ci = ["github"]
# Allow dirty working directory (for CI builds without tags)
allow-dirty = true
