# Minimal Kubernetes Configuration Example
#
# This config demonstrates using environment variables for sensitive data.
# In Kubernetes, set these via Secrets/ConfigMaps:
#
# Required Environment Variables:
#   CODEX_DATABASE_DB_TYPE=postgres
#   CODEX_DATABASE_POSTGRES_HOST=postgres-service
#   CODEX_DATABASE_POSTGRES_PORT=5432
#   CODEX_DATABASE_POSTGRES_USERNAME=<from secret>
#   CODEX_DATABASE_POSTGRES_PASSWORD=<from secret>
#   CODEX_DATABASE_POSTGRES_DATABASE_NAME=codex
#   CODEX_AUTH_JWT_SECRET=<from secret>
#
# Optional overrides:
#   CODEX_APPLICATION_HOST=0.0.0.0
#   CODEX_APPLICATION_PORT=8080
#   CODEX_API_ENABLE_API_DOCS=false
#   CODEX_LOGGING_LEVEL=info
#   CODEX_LOGGING_CONSOLE=true
#   CODEX_LOGGING_FILE=/var/log/codex/codex.log
#
# Startup-Time Settings (Require Pod Restart)
# ============================================
# These settings are in the config file and require a pod restart to change.
# Override via environment variables if needed:
#   CODEX_TASK_WORKER_COUNT=2
#   CODEX_SCANNER_MAX_CONCURRENT_SCANS=2
#   CODEX_FILES_THUMBNAIL_DIR=data/thumbnails
#   CODEX_FILES_UPLOADS_DIR=data/uploads
#
# PDF Settings:
#   CODEX_PDF_PDFIUM_LIBRARY_PATH=/usr/lib/libpdfium.so
#   CODEX_PDF_RENDER_DPI=150
#   CODEX_PDF_JPEG_QUALITY=85
#   CODEX_PDF_CACHE_RENDERED_PAGES=true
#   CODEX_PDF_CACHE_DIR=data/cache
#
# Komga API (for third-party app compatibility):
#   CODEX_KOMGA_API_ENABLED=false
#   CODEX_KOMGA_API_PREFIX=komgav1

task:
  worker_count: 2 # Number of parallel task workers per pod

scanner:
  max_concurrent_scans: 2 # Max concurrent library scans

files:
  thumbnail_dir: data/thumbnails # Thumbnail cache directory (persistent volume mount)
  uploads_dir: data/uploads # User uploads directory (persistent volume mount)

# Configuration Priority:
#   1. Environment Variables (highest - overrides config file)
#   2. Config File (this file)
#   3. Hardcoded Defaults (lowest)

# With all env vars set, you only need this minimal config:
# (or even an empty file - everything will use defaults + env vars)

# Uncomment to override defaults:
# application:
#   host: 0.0.0.0
#   port: 8080

# Uncomment to enable file logging:
# logging:
#   level: info
#   console: true
#   file: /var/log/codex/codex.log

# PDF Rendering Settings:
# pdf:
#   render_dpi: 150
#   jpeg_quality: 85
#   cache_rendered_pages: true
#   cache_dir: data/cache

# Komga-Compatible API (for third-party apps):
# komga_api:
#   enabled: false
#   prefix: komgav1
