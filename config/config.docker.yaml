# Codex Configuration for Docker with PostgreSQL

database:
  db_type: postgres
  postgres:
    host: postgres
    port: 5432
    username: codex
    password: codex
    database_name: codex

application:
  name: Codex
  host: 0.0.0.0
  port: 8080
  debug: true

logging:
  level: info
  # file: ./logs/codex.log  # Uncomment to enable file logging

# Auth config - uses defaults, override with CODEX_AUTH_* env vars
# Defaults: JWT 24h expiry, Argon2 (19456, 2, 1)
auth:
  jwt_secret: "CHANGE_ME_IN_PRODUCTION"  # Override with CODEX_AUTH_JWT_SECRET env var

# API config - uses defaults except Swagger enabled for Docker
api:
  enable_swagger: true  # Enabled in Docker for easier API testing

# Scanner config - uses defaults
# Defaults: max_concurrent_scans=2, scan_timeout_minutes=120, retry_failed_files=false, auto_analyze_concurrency=4
# scanner:
#   max_concurrent_scans: 2
#   scan_timeout_minutes: 120
#   retry_failed_files: false
#   auto_analyze_concurrency: 4  # Number of concurrent analysis tasks after scan (0 = disabled)
