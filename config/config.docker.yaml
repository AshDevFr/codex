# Codex Configuration for Docker with PostgreSQL

database:
  db_type: postgres
  postgres:
    host: postgres
    port: 5432
    username: codex
    password: codex
    database_name: codex

application:
  # NOTE: application.name moved to database settings (runtime configurable)
  name: Codex
  host: 0.0.0.0
  port: 8080

logging:
  # NOTE: logging.level moved to database settings (runtime configurable)
  level: info
  # file: ./logs/codex.log  # Uncomment to enable file logging

# Auth config - uses defaults, override with CODEX_AUTH_* env vars
# Security settings - kept in config (not moved to database)
auth:
  jwt_secret: "CHANGE_ME_IN_PRODUCTION" # Override with CODEX_AUTH_JWT_SECRET env var

# API config - security boundaries, kept in config (not moved to database)
api:
  enable_swagger: true # Enabled in Docker for easier API testing

# Task Worker Settings (Startup-Time - Require Restart)
# ======================================================
# These settings control worker behavior and require a restart to take effect.
task:
  worker_count: 4 # Number of parallel task workers (override: CODEX_TASK_WORKER_COUNT)

# Scanner Settings (Startup-Time - Require Restart)
# ==================================================
scanner:
  max_concurrent_scans: 2 # Max concurrent library scans (override: CODEX_SCANNER_MAX_CONCURRENT_SCANS)

# Thumbnail Settings (Startup-Time - Require Restart)
# ====================================================
# Runtime settings (max_dimension, jpeg_quality) are stored in the database
# and can be changed via the Settings API without restart.
thumbnail:
  cache_dir: data/thumbnails # Thumbnail cache directory (override: CODEX_THUMBNAIL_CACHE_DIR)
