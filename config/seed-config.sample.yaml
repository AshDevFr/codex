# Codex Seed Configuration
# ========================
#
# Optional configuration for `codex seed --seed-config <this-file>`.
# All sections are optional — omit any section you don't need.
#
# Usage:
#   codex seed --config config/codex.yaml --seed-config config/seed-config.yaml

# =============================================================================
# User Passwords
# =============================================================================
# Override the default random password generation for seeded users.
# If a user is omitted here, a random password will be generated.
users:
  admin:
    password: "admin"
  maintainer:
    password: "maintainer"
  reader:
    password: "reader"

# =============================================================================
# Plugins
# =============================================================================
# Register plugins during seed. Plugins that already exist (by name) are skipped.
#
# For Docker development, plugins are mounted at /opt/codex/plugins/<name>/dist/
# For production, use npx: command: "npx", args: ["-y", "@ashdev/codex-plugin-<name>"]
#
# credential_delivery options: "init_message" (default), "env", "both"
# credentials: YAML mapping of API keys/tokens (optional, can be set later via UI).
#   Use a YAML mapping, NOT a quoted JSON string — quoting turns it into a string
#   and the plugin will receive the raw text instead of an object.
#
# NOTE: If credentials are provided, CODEX_ENCRYPTION_KEY must be set.
#
# libraries: optional list of library NAMES this plugin is scoped to (must match
#   names in the `libraries:` section below). Empty/absent = all libraries.
#   Used by metadata, sync, and recommendation plugins. To run the same plugin
#   per-library, add it twice under different `name`s, each scoped to one
#   library (e.g. one AniList Sync for Manga, another for Comics). Libraries are
#   seeded before plugins, so a referenced name that doesn't exist is an error.
plugins:
  # MangaBaka - Manga metadata provider (requires API key)
  - name: metadata-mangabaka
    display_name: MangaBaka Metadata
    description: Fetch manga metadata from MangaBaka - aggregated data from multiple sources
    command: node
    args: ["/opt/codex/plugins/metadata-mangabaka/dist/index.js"]
    permissions:
      - "metadata:write:*"
      - "metadata:read"
    scopes:
      - "series:detail"
      - "series:bulk"
      - "library:detail"
      - "library:scan"
    credential_delivery: init_message
    # credentials:
    #   api_key: "your-mangabaka-api-key"

  # Echo - Test/debug plugin (no credentials needed)
  - name: metadata-echo
    display_name: Echo Metadata Plugin
    description: Test metadata plugin that echoes back search queries
    command: node
    args: ["/opt/codex/plugins/metadata-echo/dist/index.js"]
    permissions:
      - "metadata:write:*"
      - "metadata:read"
    scopes:
      - "series:detail"
      - "series:bulk"
      - "book:detail"
      - "book:bulk"
      - "library:detail"
      - "library:scan"
    credential_delivery: env

  # Echo Sync - test/debug sync plugin (no credentials needed)
  - name: sync-echo
    display_name: Echo Sync Plugin
    description: Test sync plugin that echoes push payloads and returns deterministic pull entries
    plugin_type: user
    command: node
    args: ["/opt/codex/plugins/sync-echo/dist/index.js"]
    permissions: []
    scopes: []
    credential_delivery: env

  # Echo Recommendations - test/debug recommendations plugin (no credentials needed)
  - name: recommendations-echo
    display_name: Echo Recommendations Plugin
    description: Test recommendations plugin that echoes library seeds back as recommendations
    plugin_type: user
    command: node
    args: ["/opt/codex/plugins/recommendations-echo/dist/index.js"]
    permissions: []
    scopes: []
    credential_delivery: env

  # Open Library - Book metadata provider (no credentials needed)
  - name: metadata-openlibrary
    display_name: Open Library
    description: Fetches book metadata from Open Library - supports ISBN lookup and title search
    command: node
    args: ["/opt/codex/plugins/metadata-openlibrary/dist/index.js"]
    permissions:
      - "metadata:write:*"
      - "metadata:read"
    scopes:
      - "book:detail"
      - "book:bulk"
      - "library:detail"
      - "library:scan"
    credential_delivery: env

  # AniList Recommendations - Personalized manga recommendations
  # Recommendation plugins are gated by manifest capability + per-user enable;
  # they don't write metadata, so no `permissions` or `scopes` are needed.
  - name: recommendations-anilist
    display_name: AniList Recommendations
    description: Personalized manga recommendations from AniList based on reading history
    plugin_type: user
    command: node
    args: ["/opt/codex/plugins/recommendations-anilist/dist/index.js"]
    permissions: []
    scopes: []
    credential_delivery: env

  # AniList Sync - Reading progress sync
  # Sync plugins are gated by manifest capability + per-user enable; they don't
  # write series/book metadata, so no `permissions` or `scopes` are needed.
  - name: sync-anilist
    display_name: AniList Sync
    description: Sync manga reading progress between Codex and AniList
    plugin_type: user
    command: node
    args: ["/opt/codex/plugins/sync-anilist/dist/index.js"]
    permissions: []
    scopes: []
    credential_delivery: env
    # Scope this instance to specific libraries (by name). Absent = all.
    # libraries: [Manga]

  # Per-library example: the same plugin registered a second time under a
  # different name, scoped to the Comics library. Each instance has its own
  # config/credentials and only sees the libraries listed here. Scope
  # same-source instances to DISJOINT libraries to avoid double-syncing a series.
  # - name: sync-anilist-comics
  #   display_name: AniList Sync (Comics)
  #   description: Sync reading progress for the Comics library
  #   plugin_type: user
  #   command: node
  #   args: ["/opt/codex/plugins/sync-anilist/dist/index.js"]
  #   permissions: []
  #   scopes: []
  #   credential_delivery: env
  #   libraries: [Comics]

  # MangaUpdates Releases - Translation/scanlation release feed (no credentials needed)
  # Release-source plugins are gated by manifest capability at reverse-RPC
  # dispatch; they don't write metadata, so no `permissions` or `scopes` are needed.
  #
  # On first start the plugin auto-registers a single source row visible at
  # Settings → Release tracking. Optional `config.blockedGroups` (CSV) filters
  # noisy scanlators server-wide.
  - name: release-mangaupdates
    display_name: MangaUpdates Releases
    description: Announces new chapter releases for tracked series via MangaUpdates per-series RSS feeds
    command: node
    args: ["/opt/codex/plugins/release-mangaupdates/dist/index.js"]
    permissions: []
    scopes: []
    credential_delivery: env
    # config:
    #   blockedGroups: "LowQualityScans,MTL Group"

  # Nyaa Releases - Acquisition-pointer source for trusted uploaders (no credentials needed)
  #
  # The `uploaders` config below drives one source row per entry at
  # Settings → Release tracking. Each entry is one of:
  #   `username`        -> Nyaa user feed (https://nyaa.si/?page=rss&u=<username>)
  #   `q:<text>`        -> plain site-wide search
  #   `q:?<key=value>`  -> URL-style search with allowlisted keys (q, c, f, u),
  #                        e.g. `q:?c=3_1&q=Berserk` for English-translated
  #                        Literature category. See plugin docs for details.
  #
  # Removing an entry and re-saving prunes its source row (and its
  # release_ledger history). Per-source poll interval / enable / "Poll now"
  # live in the Release tracking UI.
  - name: release-nyaa
    display_name: Nyaa Releases
    description: Announces new chapter / volume torrents for tracked series via Nyaa.si uploader RSS feeds
    command: node
    args: ["/opt/codex/plugins/release-nyaa/dist/index.js"]
    permissions: []
    scopes: []
    credential_delivery: env
    # config:
    #   uploaders: "tsuna69,TankobonBlur,q:?c=3_1&q=Berserk"

# =============================================================================
# Libraries
# =============================================================================
# Create libraries during seed. Libraries that already exist (by path) are skipped.
#
# Adjust paths to match your volume mounts or local filesystem.
# In Docker dev, /libraries/ is the default mount point (see docker-compose.yml).
#
# Strategy options:
#   series_strategy: series_volume (default), series_volume_chapter, flat, publisher_hierarchy, calibre
#   book_strategy: filename (default), metadata_first, smart, series_name, custom
#   number_strategy: file_order (default), metadata, filename, smart
#   default_reading_direction: LEFT_TO_RIGHT (default), RIGHT_TO_LEFT, VERTICAL, WEBTOON
#   allowed_formats: list of formats, e.g. [cbz, cbr, epub, pdf]
#   excluded_patterns: list of glob patterns, e.g. ["*.txt", "thumbs.db"]
#
# title_preprocessing_rules: regex transforms applied to series titles before
#   metadata search, in order. Each rule: pattern, replacement (empty to remove),
#   optional description, optional enabled (default true). Use single-quoted
#   scalars so backslashes stay literal: '\s*\(Digital\)$' not "\\s*\\(Digital\\)$".
#
# auto_match_conditions: gate auto-matching on series properties.
#   mode: all (AND) or any (OR); rules: [{field, operator, value}].
#   operators: is_null, is_not_null, equals, not_equals, gt, gte, lt, lte,
#              contains, not_contains, starts_with, ends_with, matches, in, not_in
libraries:
  - name: Comics
    path: /libraries/comics
    # series_strategy: series_volume
    # book_strategy: filename
    # number_strategy: file_order
    # default_reading_direction: LEFT_TO_RIGHT
    # title_preprocessing_rules:
    #   - pattern: '\s*\(Digital\)$'
    #     replacement: ''
    #     description: Remove (Digital) suffix
    #     enabled: true
    # auto_match_conditions:
    #   mode: all
    #   rules:
    #     - field: external_ids.plugin:mangabaka
    #       operator: is_null
    #     - field: book_count
    #       operator: gte
    #       value: 1

  - name: Manga
    path: /libraries/manga
    series_strategy: series_volume_chapter
    default_reading_direction: RIGHT_TO_LEFT

  - name: Books
    path: /libraries/books
    series_strategy: calibre
    book_strategy: metadata_first
    # series_config options for calibre:
    #   strip_id_suffix: true       # Strip Calibre ID suffix " (123)" from folder names (default: true)
    #   series_mode: from_metadata  # standalone, by_author, or from_metadata (default: from_metadata)
    #   read_opf_metadata: true     # Read metadata.opf files (default: true)
    #   author_from_folder: true    # Use author folder name as author (default: true)
    series_config:
      strip_id_suffix: true
      series_mode: from_metadata
      read_opf_metadata: true
      author_from_folder: true
